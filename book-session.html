<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Session — UniSkilled</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1a6bff;--ink:#111827;--mid:#6b7280;--light:#9ca3af;--border:#e5e7eb;--white:#fff;--off:#f9fafb;--green:#059669;--green-bg:#ecfdf5;--red:#dc2626;--red-bg:#fef2f2;}
body{font-family:'Manrope',sans-serif;background:var(--off);color:var(--ink);min-height:100vh;}
nav{position:sticky;top:0;z-index:100;height:60px;background:rgba(255,255,255,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5%;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--ink);}
.logo-icon{width:30px;height:30px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;}
.page{max-width:560px;margin:2rem auto;padding:0 5%;}
.card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:2rem;margin-bottom:1.2rem;}
.card-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--light);margin-bottom:1.2rem;padding-bottom:0.7rem;border-bottom:1px solid var(--border);}
.tutor-info{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
.tutor-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1a6bff,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;font-weight:800;overflow:hidden;flex-shrink:0;}
.tutor-av img{width:100%;height:100%;object-fit:cover;}
.form-group{margin-bottom:1rem;}
.form-label{display:block;font-size:0.8rem;font-weight:700;color:var(--ink);margin-bottom:0.4rem;}
.form-input,.form-select,.form-textarea{width:100%;padding:0.78rem 0.95rem;border:1.5px solid var(--border);border-radius:9px;font-family:'Manrope',sans-serif;font-size:0.88rem;color:var(--ink);background:var(--white);outline:none;transition:border-color .18s,box-shadow .18s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,255,0.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-textarea{resize:vertical;min-height:80px;}
.btn-submit{width:100%;padding:0.95rem;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:'Manrope',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-submit:hover{background:#1558e0;box-shadow:0 6px 20px rgba(26,107,255,0.3);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
.alert{padding:0.82rem 1rem;border-radius:9px;font-size:0.83rem;font-weight:500;margin-bottom:1rem;display:none;}
.alert.error{background:var(--red-bg);color:var(--red);border:1px solid #fecaca;display:block;}
.alert.success{background:var(--green-bg);color:var(--green);border:1px solid #a7f3d0;display:block;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.free-badge{background:var(--green-bg);color:var(--green);font-size:0.78rem;font-weight:700;padding:4px 12px;border-radius:100px;display:inline-block;margin-bottom:1rem;}
</style>
<style>
@media(max-width:768px){
  .nav-links{display:none!important;}
  .nav-burger{display:block!important;}
  .nav-brand{display:none;}
}
</style>
</head>
<body>
<nav style="position:sticky;top:0;z-index:200;height:60px;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 5%;font-family:'Manrope',sans-serif;">
  <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;font-weight:800;font-size:1.1rem;color:#111827;">
    <div style="width:30px;height:30px;background:#1a6bff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:0.9rem;">U</div>
    <span class="nav-brand">UniSkilled</span>
  </a>
  <div style="display:flex;align-items:center;gap:0.5rem;" class="nav-links">
    <a href="index.html" style="font-size:0.82rem;font-weight:600;color:#6b7280;text-decoration:none;padding:0.4rem 0.7rem;border-radius:7px;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='none'">🏠 Home</a>
    <a href="student-dashboard.html" style="font-size:0.82rem;font-weight:600;color:#6b7280;text-decoration:none;padding:0.4rem 0.7rem;border-radius:7px;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='none'">📊 Dashboard</a>
    <a href="messages.html" style="font-size:0.82rem;font-weight:600;color:#6b7280;text-decoration:none;padding:0.4rem 0.7rem;border-radius:7px;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='none'">💬 Messages</a>
    <a href="find-tutors.html" style="font-size:0.82rem;font-weight:700;background:#1a6bff;color:#fff;text-decoration:none;padding:0.4rem 0.9rem;border-radius:8px;">Find Tutors</a>
  </div>
  <button class="nav-burger" onclick="toggleMobileNav(this)" style="display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#111827;">☰</button>
</nav>
<div class="page">
  <div class="card">
    <div class="tutor-info" id="tutorInfo">
      <div class="tutor-av" id="tutorAv">?</div>
      <div>
        <div style="font-weight:800;font-size:1.1rem;" id="tutorName">Loading...</div>
        <div style="font-size:0.78rem;color:var(--mid);" id="tutorSubjects"></div>
        <div style="font-size:0.82rem;font-weight:700;color:var(--blue);margin-top:3px;" id="tutorRate"></div>
      </div>
    </div>
    <div style="background:#ecfdf5;color:#059669;font-size:0.78rem;font-weight:700;padding:6px 14px;border-radius:100px;display:inline-block;margin-bottom:1rem;">✓ Free session booking — no payment needed</div>

    <div id="alert" class="alert"></div>

    <div class="form-group">
      <label class="form-label">Subject *</label>
      <input type="text" id="subject" class="form-input" placeholder="e.g. Linear Algebra, Python basics...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date *</label>
        <input type="date" id="date" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Time *</label>
        <input type="time" id="time" class="form-input">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Duration</label>
        <select id="duration" class="form-select">
          <option value="60">60 minutes</option>
          <option value="90">90 minutes</option>
          <option value="120">120 minutes</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Format</label>
        <select id="format" class="form-select">
          <option value="online">Online</option>
          <option value="inperson">In-person</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes for tutor (optional)</label>
      <textarea id="notes" class="form-textarea" placeholder="What do you want to cover? Any specific topics or questions?"></textarea>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitBooking()">
      <span id="btnText">Request session</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>
</div>

<script>
const SUPABASE_URL='https://orghkbbohnabcietidiv.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yZ2hrYmJvaG5hYmNpZXRpZGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzcwMTMsImV4cCI6MjA5MjcxMzAxM30.3bOnZuga8a4xY4mbKdgLnw6EwAV5UuQDz26JI_vM-u8';
const CURRENCY_SYMBOLS = {
  GBP:'£', EUR:'€', USD:'$', TRY:'₺', AED:'AED', SAR:'SAR',
  QAR:'QAR', KWD:'KWD', EGP:'EGP', MAD:'MAD', NGN:'₦', KES:'KSh',
  INR:'₹', CAD:'CA$', AUD:'A$', CHF:'CHF', SEK:'kr', NOK:'kr',
  DKK:'kr', PLN:'zł'
};
function currSymbol(code) { return CURRENCY_SYMBOLS[code] || code || '£'; }

const _sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const params=new URLSearchParams(window.location.search);
const tutorId=params.get('tutor');
const tutorNameParam=decodeURIComponent(params.get('name')||'Tutor');
let currentUser=null;
let tutorData=null;

// Set min date to today
document.getElementById('date').min=new Date().toISOString().split('T')[0];

async function init(){
  const {data:{session}}=await _sb.auth.getSession();
  if(!session){
    window.location.href='signin.html?redirect='+encodeURIComponent(window.location.href);
    return;
  }
  currentUser=session.user;

  // Load tutor info
  const {data:tp}=await _sb.from('tutor_profiles').select('*').eq('user_id',tutorId).single();
  const {data:u}=await _sb.from('users').select('full_name,avatar_url').eq('id',tutorId).single();
  tutorData={...tp,...u};

  const name=u?.full_name||tutorNameParam;
  const initials=name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const av=document.getElementById('tutorAv');
  const avatarUrl=tp?.avatar_url||u?.avatar_url;
  if(avatarUrl)av.innerHTML=`<img src="${avatarUrl}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  else av.textContent=initials;

  document.getElementById('tutorName').textContent=name;
  const subjects=Array.isArray(tp?.subjects)?tp.subjects:[];
  document.getElementById('tutorSubjects').textContent=subjects.join(', ')||'';
  const sym = currSymbol(tp?.currency || 'GBP');
  document.getElementById('tutorRate').textContent = tp?.hourly_rate ? sym+tp.hourly_rate+'/hr (free to book for now)' : 'Free to book';

  // Pre-fill subject if only one
  if(subjects.length===1)document.getElementById('subject').value=subjects[0];
}

async function submitBooking(){
  const subject=document.getElementById('subject').value.trim();
  const date=document.getElementById('date').value;
  const time=document.getElementById('time').value;
  const duration=document.getElementById('duration').value;
  const format=document.getElementById('format').value;
  const notes=document.getElementById('notes').value.trim();

  if(!subject){showAlert('Please enter a subject.','error');return;}
  if(!date){showAlert('Please select a date.','error');return;}
  if(!time){showAlert('Please select a time.','error');return;}

  // Check date is in future
  const sessionDate=new Date(date+'T'+time);
  if(sessionDate<new Date()){showAlert('Please select a future date and time.','error');return;}

  setLoading(true);

  // Get student name
  const {data:sp}=await _sb.from('users').select('full_name').eq('id',currentUser.id).single();
  const studentName=sp?.full_name||'Student';
  const tutorName=tutorData?.full_name||tutorNameParam;
  const price = 0; // Free booking - Stripe will be added later

  // Create session
  const {data:session,error}=await _sb.from('sessions').insert({
    tutor_id:tutorId,
    student_id:currentUser.id,
    tutor_name:tutorName,
    student_name:studentName,
    subject,
    scheduled_date:date,
    scheduled_time:time,
    duration_minutes:parseInt(duration),
    format,
    status:'pending',
    price,
    notes:notes||null
  }).select().single();

  if(error){showAlert('Error: '+error.message,'error');setLoading(false);return;}

  // Create notification for tutor
  await _sb.from('notifications').insert({
    user_id:tutorId,
    type:'booking_request',
    title:'New session request',
    body:studentName+' wants to book a '+subject+' session on '+new Date(date).toLocaleDateString(),
    link:'tutor-dashboard.html',
    read:false
  });

  // Create/get conversation and send message
  let convId=null;
  const p1=currentUser.id<tutorId?currentUser.id:tutorId;
  const p2=currentUser.id<tutorId?tutorId:currentUser.id;

  const {data:existingConv}=await _sb.from('conversations')
    .select('id').eq('participant_1',p1).eq('participant_2',p2).single();

  if(existingConv){
    convId=existingConv.id;
  } else {
    const {data:newConv}=await _sb.from('conversations').insert({
      participant_1:p1,participant_2:p2,
      participant_1_name:p1===currentUser.id?studentName:tutorName,
      participant_2_name:p2===currentUser.id?studentName:tutorName,
      last_message:'Session request: '+subject,
      last_message_at:new Date().toISOString()
    }).select().single();
    convId=newConv?.id;
  }

  if(convId){
    await _sb.from('messages').insert({
      conversation_id:convId,
      sender_id:currentUser.id,
      receiver_id:tutorId,
      sender_name:studentName,
      content:'Hi! I\'d like to book a '+subject+' session on '+new Date(date).toLocaleDateString()+' at '+time+'. '+( notes?'Notes: '+notes:''),
      read:false
    });
    // Update conversation last message
    await _sb.from('conversations').update({
      last_message:'Session request: '+subject,
      last_message_at:new Date().toISOString()
    }).eq('id',convId);
  }

  setLoading(false);
  showAlert('Session request sent! Waiting for tutor confirmation.','success');

  // Send confirmation email to tutor
  try {
    const {data:tutorUser} = await _sb.from('users').select('email').eq('id',tutorId).single();
    if(tutorUser?.email) {
      await fetch('https://orghkbbohnabcietidiv.supabase.co/functions/v1/send-email', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          type:'booking_request',
          to: tutorUser.email,
          data:{
            tutorName, studentName, subject,
            date: new Date(date).toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
            time, duration, format, notes:notes||''
          }
        })
      });
    }
  } catch(e){ console.error('Email failed (non-critical):', e); }

  setTimeout(()=>window.location.href='student-dashboard.html',2000);
}

function showAlert(msg,type){
  const el=document.getElementById('alert');
  el.textContent=msg;el.className='alert '+type;
}
function setLoading(loading){
  document.getElementById('submitBtn').disabled=loading;
  document.getElementById('btnText').textContent=loading?'Sending request...':'Request session';
  document.getElementById('spinner').style.display=loading?'block':'none';
}

document.addEventListener('DOMContentLoaded',init);
</script>
<script>
function toggleMobileNav(btn){
  const nav=document.getElementById('mobileNav');
  const isOpen=nav.style.display==='flex';
  nav.style.display=isOpen?'none':'flex';
  btn.textContent=isOpen?'☰':'✕';
}
</script>
</body>
</html>
