<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — UniSkilled</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1a6bff;--ink:#111827;--ink2:#374151;--mid:#6b7280;--light:#9ca3af;--border:#e5e7eb;--white:#fff;--off:#f9fafb;--green:#059669;--green-bg:#ecfdf5;--red:#dc2626;--red-bg:#fef2f2;}
body{font-family:'Manrope',sans-serif;background:var(--off);color:var(--ink);min-height:100vh;}
nav{position:sticky;top:0;z-index:100;height:60px;background:rgba(255,255,255,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5%;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--ink);}
.logo-icon{width:30px;height:30px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:0.9rem;}
.nav-back{font-size:0.85rem;font-weight:600;color:var(--mid);text-decoration:none;display:flex;align-items:center;gap:5px;}
.nav-back:hover{color:var(--ink);}
.page{max-width:720px;margin:0 auto;padding:2rem 5%;}
.profile-header{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem;}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.6rem;font-weight:800;flex-shrink:0;}
.header-info h1{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.2rem;}
.header-info p{font-size:0.85rem;color:var(--mid);}
.verified-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);color:var(--green);font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:100px;margin-top:0.4rem;}
.card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:1.8rem;margin-bottom:1.2rem;}
.card-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--light);margin-bottom:1.4rem;padding-bottom:0.8rem;border-bottom:1px solid var(--border);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1rem;}
.form-label{display:block;font-size:0.8rem;font-weight:700;color:var(--ink2);margin-bottom:0.4rem;}
.form-input,.form-select,.form-textarea{width:100%;padding:0.78rem 0.95rem;border:1.5px solid var(--border);border-radius:9px;font-family:'Manrope',sans-serif;font-size:0.88rem;color:var(--ink);background:var(--white);outline:none;transition:border-color .18s,box-shadow .18s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,255,0.1);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--light);}
.form-textarea{resize:vertical;min-height:100px;line-height:1.6;}
.subjects-wrap{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.8rem;}
.subject-tag{display:inline-flex;align-items:center;gap:6px;background:var(--off);border:1.5px solid var(--border);border-radius:100px;padding:4px 12px;font-size:0.8rem;font-weight:600;}
.subject-tag button{background:none;border:none;cursor:pointer;color:var(--light);font-size:0.9rem;line-height:1;padding:0;}
.subject-tag button:hover{color:var(--red);}
.subject-add{display:flex;gap:0.6rem;}
.subject-input{flex:1;padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:9px;font-family:'Manrope',sans-serif;font-size:0.85rem;outline:none;transition:border-color .18s;}
.subject-input:focus{border-color:var(--blue);}
.subject-btn{padding:0.65rem 1.1rem;background:var(--blue);color:#fff;border:none;border-radius:9px;font-family:'Manrope',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;white-space:nowrap;}
.avail-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0.5rem;margin-bottom:1rem;}
.avail-day{text-align:center;}
.avail-day label{display:block;font-size:0.7rem;font-weight:700;color:var(--mid);margin-bottom:0.3rem;text-transform:uppercase;}
.avail-toggle{width:100%;aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);background:var(--off);cursor:pointer;transition:all .18s;font-size:0.7rem;font-weight:700;color:var(--light);}
.avail-toggle.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-save{width:100%;padding:0.92rem;background:var(--blue);color:#fff;border:none;border-radius:9px;font-family:'Manrope',sans-serif;font-size:0.93rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-save:hover{background:#1558e0;box-shadow:0 6px 20px rgba(26,107,255,0.35);}
.btn-save:disabled{opacity:0.6;cursor:not-allowed;}
.alert{padding:0.82rem 1rem;border-radius:9px;font-size:0.83rem;font-weight:500;margin-bottom:1rem;display:none;}
.alert.error{background:var(--red-bg);color:var(--red);border:1px solid #fecaca;display:block;}
.alert.success{background:var(--green-bg);color:var(--green);border:1px solid #a7f3d0;display:block;}
.spinner{width:17px;height:17px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .form-row{grid-template-columns:1fr;}
  .avail-grid{grid-template-columns:repeat(4,1fr);}
  .profile-header{flex-direction:column;text-align:center;}
}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><div class="logo-icon">U</div>UniSkilled</a>
  <a class="nav-back" href="student-dashboard.html">← Back to dashboard</a>
</nav>
<div class="page">
  <div id="alert" class="alert"></div>

  <div class="profile-header">
    <div class="avatar" id="avatarEl">?</div>
    <div class="header-info">
      <h1 id="headerName">Loading...</h1>
      <p id="headerInfo"></p>
      <div class="verified-badge">✓ Verified Student</div>
    </div>
  </div>

  <!-- Personal Info -->
  <div class="card">
    <div class="card-title">Personal Information</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First name</label>
        <input type="text" id="firstName" class="form-input" placeholder="Sara">
      </div>
      <div class="form-group">
        <label class="form-label">Last name</label>
        <input type="text" id="lastName" class="form-input" placeholder="Johnson">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Gender</label>
        <select id="gender" class="form-select">
          <option value="">Prefer not to say</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="non-binary">Non-binary</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Country</label>
        <input type="text" id="country" class="form-input" placeholder="e.g. Germany">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Primary language</label>
      <input type="text" id="language" class="form-input" placeholder="e.g. English">
    </div>
    <div class="form-group">
      <label class="form-label">Bio</label>
      <textarea id="bio" class="form-textarea" placeholder="Tell tutors and businesses a bit about yourself..."></textarea>
    </div>
  </div>

  <!-- Academic Info -->
  <div class="card">
    <div class="card-title">Academic Details</div>
    <div class="form-group">
      <label class="form-label">University</label>
      <input type="text" id="university" class="form-input" placeholder="e.g. University of Edinburgh">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Degree / Course</label>
        <input type="text" id="degree" class="form-input" placeholder="e.g. Computer Science">
      </div>
      <div class="form-group">
        <label class="form-label">Year of study</label>
        <select id="yearOfStudy" class="form-select">
          <option value="">Select year</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
          <option value="5">5th Year+</option>
          <option value="postgrad">Postgraduate</option>
          <option value="phd">PhD</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Subjects -->
  <div class="card">
    <div class="card-title">Subjects I want to learn</div>
    <div class="subjects-wrap" id="subjectsList"></div>
    <div class="subject-add">
      <input type="text" class="subject-input" id="subjectInput" placeholder="e.g. Linear Algebra, Python, Economics...">
      <button class="subject-btn" id="addSubjectBtn">+ Add</button>
    </div>
  </div>

  <!-- Availability -->
  <div class="card">
    <div class="card-title">Availability</div>
    <div class="avail-grid">
      <div class="avail-day"><label>Mon</label><button class="avail-toggle" data-day="mon">M</button></div>
      <div class="avail-day"><label>Tue</label><button class="avail-toggle" data-day="tue">T</button></div>
      <div class="avail-day"><label>Wed</label><button class="avail-toggle" data-day="wed">W</button></div>
      <div class="avail-day"><label>Thu</label><button class="avail-toggle" data-day="thu">T</button></div>
      <div class="avail-day"><label>Fri</label><button class="avail-toggle" data-day="fri">F</button></div>
      <div class="avail-day"><label>Sat</label><button class="avail-toggle" data-day="sat">S</button></div>
      <div class="avail-day"><label>Sun</label><button class="avail-toggle" data-day="sun">S</button></div>
    </div>
    <div class="form-group">
      <label class="form-label">Preferred time</label>
      <select id="preferredTime" class="form-select">
        <option value="">Any time</option>
        <option value="morning">Morning (8am–12pm)</option>
        <option value="afternoon">Afternoon (12pm–5pm)</option>
        <option value="evening">Evening (5pm–10pm)</option>
        <option value="flexible">Flexible</option>
      </select>
    </div>
  </div>

  <div id="alert2" class="alert"></div>
  <button class="btn-save" id="saveBtn">
    <span id="saveBtnText">Save changes</span>
    <div class="spinner" id="saveSpinner"></div>
  </button>
</div>

<script>
const SUPABASE_URL = 'https://orghkbbohnabcietidiv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yZ2hrYmJvaG5hYmNpZXRpZGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzcwMTMsImV4cCI6MjA5MjcxMzAxM30.3bOnZuga8a4xY4mbKdgLnw6EwAV5UuQDz26JI_vM-u8';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let subjects = [];
let availability = [];

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type;
  setTimeout(() => el.className = 'alert', 4000);
}

function renderSubjects() {
  const wrap = document.getElementById('subjectsList');
  wrap.innerHTML = subjects.map((s, i) => `
    <span class="subject-tag">${s}
      <button onclick="removeSubject(${i})">×</button>
    </span>`).join('');
}

window.removeSubject = function(i) {
  subjects.splice(i, 1);
  renderSubjects();
};

document.getElementById('addSubjectBtn').addEventListener('click', function() {
  const inp = document.getElementById('subjectInput');
  const val = inp.value.trim();
  if (val && !subjects.includes(val)) {
    subjects.push(val);
    renderSubjects();
  }
  inp.value = '';
});

document.getElementById('subjectInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('addSubjectBtn').click();
});

document.querySelectorAll('.avail-toggle').forEach(btn => {
  btn.addEventListener('click', function() {
    const day = btn.getAttribute('data-day');
    if (availability.includes(day)) {
      availability = availability.filter(d => d !== day);
      btn.classList.remove('active');
    } else {
      availability.push(day);
      btn.classList.add('active');
    }
  });
});

async function loadProfile() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = 'signin.html'; return; }
  const user = session.user;

  const { data: profile } = await _sb.from('users')
    .select('*').eq('id', user.id).single();
  const { data: sp } = await _sb.from('student_profiles')
    .select('*').eq('user_id', user.id).single();

  const fullName = (profile && profile.full_name) ? profile.full_name : '';
  const parts = fullName.split(' ');
  document.getElementById('firstName').value = parts[0] || '';
  document.getElementById('lastName').value = parts.slice(1).join(' ') || '';
  document.getElementById('gender').value = (profile && profile.gender) || '';
  document.getElementById('country').value = (profile && profile.country) || '';
  document.getElementById('language').value = (profile && profile.language) || '';
  document.getElementById('bio').value = (sp && sp.bio) || '';

  if (sp) {
    document.getElementById('university').value = sp.university || '';
    document.getElementById('degree').value = sp.degree || sp.major || '';
    document.getElementById('yearOfStudy').value = sp.year_of_study || '';

    if (sp.subjects) {
      subjects = Array.isArray(sp.subjects) ? sp.subjects : sp.subjects.split(',').map(s=>s.trim()).filter(Boolean);
      renderSubjects();
    }

    if (sp.availability) {
      availability = Array.isArray(sp.availability) ? sp.availability : [];
      availability.forEach(day => {
        const btn = document.querySelector(`.avail-toggle[data-day="${day}"]`);
        if (btn) btn.classList.add('active');
      });
      document.getElementById('preferredTime').value = sp.preferred_time || '';
    }
  }

  // Update header
  const initials = fullName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() || '?';
  document.getElementById('avatarEl').textContent = initials;
  document.getElementById('headerName').textContent = fullName || 'Your Profile';
  const uni = (sp && sp.university) ? sp.university : '';
  const yr = (sp && sp.year_of_study) ? 'Year ' + sp.year_of_study : '';
  document.getElementById('headerInfo').textContent = [uni, yr].filter(Boolean).join(' · ');
}

document.getElementById('saveBtn').addEventListener('click', async function() {
  const btn = document.getElementById('saveBtn');
  const text = document.getElementById('saveBtnText');
  const spinner = document.getElementById('saveSpinner');
  btn.disabled = true;
  text.textContent = 'Saving...';
  spinner.style.display = 'block';

  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = 'signin.html'; return; }
  const user = session.user;

  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const fullName = (firstName + ' ' + lastName).trim();
  const gender = document.getElementById('gender').value;
  const country = document.getElementById('country').value.trim();
  const language = document.getElementById('language').value.trim();
  const bio = document.getElementById('bio').value.trim();
  const university = document.getElementById('university').value.trim();
  const degree = document.getElementById('degree').value.trim();
  const yearOfStudy = document.getElementById('yearOfStudy').value;
  const preferredTime = document.getElementById('preferredTime').value;

  const { error: userError } = await _sb.from('users').upsert({
    id: user.id,
    full_name: fullName,
    gender: gender || null,
    country: country || null,
    language: language || null
  });

  const { error: spError } = await _sb.from('student_profiles').upsert({
    user_id: user.id,
    university: university || null,
    degree: degree || null,
    major: degree || null,
    year_of_study: yearOfStudy ? (parseInt(yearOfStudy) || yearOfStudy) : null,
    bio: bio || null,
    subjects: subjects.length > 0 ? subjects : null,
    availability: availability.length > 0 ? availability : null,
    preferred_time: preferredTime || null,
    gender: gender || null,
    country: country || null,
    language: language || null
  });

  btn.disabled = false;
  text.textContent = 'Save changes';
  spinner.style.display = 'none';

  if (userError || spError) {
    showAlert('alert2', 'Error saving: ' + ((userError || spError).message), 'error');
  } else {
    // Update header
    const initials = fullName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('avatarEl').textContent = initials;
    document.getElementById('headerName').textContent = fullName;
    document.getElementById('headerInfo').textContent = [university, yearOfStudy ? 'Year '+yearOfStudy : ''].filter(Boolean).join(' · ');
    showAlert('alert2', 'Profile saved successfully!', 'success');
  }
});

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
