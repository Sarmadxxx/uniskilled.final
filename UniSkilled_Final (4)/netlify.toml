[[redirects]]
  from = "/"
  to = "/Home.html"
  status = 200

[[redirects]]
  from = "/signin"
  to = "/signin.html"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/register"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/tutoring"
  to = "/tutoring.html"
  status = 200

[[redirects]]
  from = "/opportunities"
  to = "/opportunities.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/student-dashboard.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin-dashboard.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
